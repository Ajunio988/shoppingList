<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Compras</title>

    <link rel="stylesheet" href="./style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="container">
      <div id="title">
        <img src="/assets/Vector.svg" alt="Logo S de store" />
        <p>hoppingList</p>
      </div>

      <button id="btnBack">
        <ion-icon id="iconArrow" name="arrow-back-outline"></ion-icon>
        Voltar
      </button>

      <h1>Compras da Semana</h1>

      <form id="newProduct">
        <input
          type="text"
          name="addProduct"
          id="addProduct"
          placeholder="Adicione um novo item"
          required
        />
        <button>Adicionar item</button>
      </form>

      <ul>
        <li>
          <input type="checkbox" />
          <span>Pão de forma</span>
          <ion-icon id="icon" name="trash-outline"></ion-icon>
        </li>
        <li>
          <input type="checkbox" />
          <span>Café preto</span>
          <ion-icon id="icon" name="trash-outline"></ion-icon>
        </li>
        <li>
          <input type="checkbox" />
          <span>Suco de laranja</span>
          <ion-icon id="icon" name="trash-outline"></ion-icon>
        </li>
        <li>
          <input type="checkbox" />
          <span>Bolacha</span>
          <ion-icon id="icon" name="trash-outline"></ion-icon>
        </li>
      </ul>

      <footer class="alert">
        <img src="/assets/warning-circle-filled.svg" id="alert" alt="Alert" />
        <span>O item foi removido da lista</span>
        <img src="/assets/close.svg" id="close" alt="X para fechar" />
      </footer>

      <script
        type="module"
        src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
      ></script>
      <script
        nomodule
        src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
      ></script>
    </div>
  </body>
</html>
